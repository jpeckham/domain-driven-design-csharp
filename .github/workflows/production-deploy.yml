name: Production Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

env:
  RESOURCE_GROUP: rg-jdpeckham
  BICEP_FILE: infrastructure/bicep/main.bicep
  BICEP_PARAMETERS: infrastructure/bicep/parameters/prod.bicepparam
  API_IMAGE_NAME: dddsocial-api

jobs:
  deploy:
    name: Deploy Azure production
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate production secrets
        shell: bash
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          set -euo pipefail
          missing=()

          for name in AZURE_CLIENT_ID AZURE_TENANT_ID AZURE_SUBSCRIPTION_ID; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required GitHub production environment secret(s):\n' >&2
            printf '  - %s\n' "${missing[@]}" >&2
            printf '\nPopulate the production environment secrets with values from infrastructure/scripts/get-github-secrets.ps1.\n' >&2
            exit 1
          fi

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy or update infrastructure
        id: infra
        shell: bash
        run: |
          set -euo pipefail
          az deployment group create \
            --resource-group "$RESOURCE_GROUP" \
            --template-file "$BICEP_FILE" \
            --parameters "$BICEP_PARAMETERS" \
            --parameters manageRoleAssignments=false \
            --query properties.outputs \
            --output json > outputs.json

          echo "acr_login_server=$(jq -r '.acrLoginServer.value' outputs.json)" >> "$GITHUB_OUTPUT"
          echo "acr_name=$(jq -r '.acrName.value' outputs.json)" >> "$GITHUB_OUTPUT"
          echo "api_container_app_name=$(jq -r '.apiContainerAppName.value' outputs.json)" >> "$GITHUB_OUTPUT"
          echo "api_url=$(jq -r '.apiUrl.value' outputs.json)" >> "$GITHUB_OUTPUT"
          echo "static_web_app_name=$(jq -r '.staticWebAppName.value' outputs.json)" >> "$GITHUB_OUTPUT"

      - name: Get Static Web Apps deployment token
        id: static_web_app
        shell: bash
        run: |
          set -euo pipefail
          token="$(az staticwebapp secrets list \
            --resource-group "$RESOURCE_GROUP" \
            --name "${{ steps.infra.outputs.static_web_app_name }}" \
            --query "properties.apiKey" \
            --output tsv)"

          if [ -z "$token" ]; then
            echo "Static Web Apps deployment token was empty." >&2
            exit 1
          fi

          echo "::add-mask::$token"
          echo "deployment_token=$token" >> "$GITHUB_OUTPUT"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Test
        run: dotnet test SocialDDD.sln --configuration Release

      - name: ACR login
        run: az acr login --name "${{ steps.infra.outputs.acr_name }}"

      - name: Build and push API image
        shell: bash
        run: |
          set -euo pipefail
          image="${{ steps.infra.outputs.acr_login_server }}/${API_IMAGE_NAME}:${GITHUB_SHA}"
          docker build \
            --file Dockerfile.api \
            --tag "$image" \
            .
          docker push "$image"
          echo "API_IMAGE=$image" >> "$GITHUB_ENV"

      - name: Update API container app
        run: |
          az containerapp update \
            --resource-group "$RESOURCE_GROUP" \
            --name "${{ steps.infra.outputs.api_container_app_name }}" \
            --image "$API_IMAGE"

      - name: Write Blazor production appsettings
        shell: bash
        run: |
          cat > src/SocialDDD.Client/wwwroot/appsettings.json <<EOF
          {
            "ApiBaseUrl": "${{ steps.infra.outputs.api_url }}"
          }
          EOF

      - name: Build Client
        run: dotnet publish src/SocialDDD.Client/SocialDDD.Client.csproj --configuration Release --output client-publish

      - name: Deploy Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.static_web_app.outputs.deployment_token }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: client-publish/wwwroot
          skip_app_build: true
